<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="afiet" />
    <meta name="description" content="Sayma, dengele — yargısız beslenme ve vücut takibi" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>afiet — sayma, dengele</title>
    <script>
      // Tema flash'ını önlemek için uygulama yüklenmeden uygula (bkz. useTheme)
      ;(function () {
        try {
          var pref = localStorage.getItem('fh:theme') || 'system'
          var dark =
            pref === 'dark' ||
            (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
          var meta = document.querySelector('meta[name="theme-color"]')
          if (meta) meta.setAttribute('content', dark ? '#020617' : '#f8fafc')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
