# Tag + GitHub Release'i repo tarafında oluşturur.
# Neden: bazı uzak geliştirme ortamlarının git proxy'si branch push'unu
# destekleyip tag push'unu desteklemiyor. /release akışı bu workflow'u
# workflow_dispatch ile tetikler; gh, tag'i hedef commit'te kendisi oluşturur.
name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Sürüm tag'i (örn. v0.5.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release (tag dahil)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          V="${TAG#v}"
          # CHANGELOG.md'den o sürümün bölümünü çek (başlık hariç gövde)
          NOTES="$(sed -n "/^## \[${V//./\\.}\]/,/^## \[/p" CHANGELOG.md | sed '1d' | sed '/^## \[/d')"
          [ -n "$NOTES" ] || NOTES="Sürüm $V"
          gh release create "$TAG" \
            --title "$TAG" \
            --target "$GITHUB_SHA" \
            --notes "$NOTES"
