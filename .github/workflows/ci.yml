# Continuous verification for pull requests and pushes targeting
# development, staging, or main. Unit tests, workspace type checks, and an
# Expo export must all pass.
#
# Release builds remain in the tag-triggered mobile-release.yml workflow.
name: ci

on:
  pull_request:
    branches: [development, staging, main]
  push:
    branches: [development, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run typecheck

      - name: Expo export (bundle verification)
        run: npx expo export --platform ios --platform android
        working-directory: apps/mobile
