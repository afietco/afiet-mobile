# Continuous verification for pull requests and pushes targeting
# development, staging, or main. Unit tests, workspace type checks, and an
# Expo export must all pass.
#
# Release builds remain in the tag-triggered mobile-release.yml workflow.
name: ci

on:
  pull_request:
    branches: [development, staging, main]
  push:
    branches: [development, staging, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run lint

      - run: npm run typecheck

      - name: Verify mobile version consistency
        run: npm run verify:mobile-version

      - name: Verify generated permission configuration
        working-directory: apps/mobile
        env:
          EXPO_NO_GIT_STATUS: 1
        run: |
          npx expo prebuild --clean --no-install
          if grep -R -E 'Allow .* to access your (camera|microphone|photos)' ios; then
            echo "English permission copy found in the generated iOS project."
            exit 1
          fi
          if grep -E 'android.permission.(RECORD_AUDIO|SYSTEM_ALERT_WINDOW)' android/app/src/main/AndroidManifest.xml | grep -v 'tools:node="remove"'; then
            echo "Active blocked permission found in the generated Android project."
            exit 1
          fi

      - name: Expo export (bundle verification)
        run: npx expo export --platform ios --platform android
        working-directory: apps/mobile
